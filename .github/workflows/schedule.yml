name: Rain Alert Automation

on:
  schedule:
    # This runs every day at 00:30 AM UTC (6:00 AM IST)
    - cron: '30 0 * * *' 
  workflow_dispatch: # This allows you to manually run it by clicking a button in GitHub

jobs:
  run-weather-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # You can match this to your current local version

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run Rain Alert Script
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          LAT: ${{ secrets.MY_LAT }}
          LON: ${{ secrets.MY_LON }}
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
          RECIPIENT_NUMBER: ${{ secrets.RECIPIENT_NUMBER }}
        run: python main.py
